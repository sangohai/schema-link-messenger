historical_gotchas:
  - issue: "GitHub API Rate Limiting for unauthorized requests"
    solution: "Must implement a proxy or securely inject a fine-grained scoped PAT during serverless deployment. NEVER fetch raw GitHub API directly from client without token, or limit will be quickly exhausted."
  - issue: "Native JS Module strict mode"
    solution: "Always append .js extension in ES module imports (e.g., `import { fetchPreview } from './api-preview.js'`). Browsers require exact file extensions unlike Webpack."